<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyramid Playfield Prototype</title>
    <meta
      name="description"
      content="Standalone layout experiment for the Ice Dice pyramid rack and playfield."
    />
    <script>
      if (location.protocol === 'file:') {
        window.addEventListener('DOMContentLoaded', () => {
          document.body.innerHTML = `
            <style>
              :root { color-scheme: dark; }
              html, body {
                margin: 0;
                min-height: 100%;
                background: linear-gradient(160deg, #06101d, #0a1b31 55%, #07111f);
                color: #eef5ff;
                font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
              }
              body {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
              }
              .card {
                width: min(860px, 100%);
                padding: 28px;
                border-radius: 24px;
                background: rgba(10, 18, 31, 0.92);
                border: 1px solid rgba(153, 185, 225, 0.18);
                box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
              }
              .kicker {
                margin: 0 0 10px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                font-size: 0.72rem;
                color: rgba(172, 197, 236, 0.78);
              }
              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 4vw, 3.4rem);
                line-height: 0.96;
              }
              p {
                margin: 0 0 14px;
                line-height: 1.6;
                color: rgba(216, 227, 247, 0.82);
              }
              code {
                padding: 0.16rem 0.35rem;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.08);
              }
              .hint {
                display: inline-flex;
                margin-top: 6px;
                padding: 10px 14px;
                border-radius: 999px;
                background: linear-gradient(135deg, #6ae0ff, #f5d46d);
                color: #06101d;
                font-weight: 700;
              }
              a {
                color: #8ae6ff;
              }
            </style>
            <div class="card">
              <p class="kicker">Pyramid Playfield Prototype</p>
              <h1>This page needs to be opened through a local server.</h1>
              <p>
                Browsers block the layout bundle when this file is opened directly from disk.
                Run <code>npm run dev</code> and open <code>http://127.0.0.1:4173/pyramid-playfield.html</code>,
                or use <code>npm run preview</code> after a build.
              </p>
              <p>
                If you already have the dev server running, click the link below:
              </p>
              <a class="hint" href="http://127.0.0.1:4173/pyramid-playfield.html">Open Local Prototype</a>
            </div>
          `;
        });
      }
    </script>
  </head>
  <body class="pyramid-playfield-page">
    <div id="root"></div>
    <script type="module" src="/src/pyramidPlayfieldPrototypePage.ts"></script>
  </body>
</html>
